<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleepwalker World</title>
<style>
body {margin:0;font-family:Arial;background:#0c0a10;color:#fff;}
section {padding:80px 20px;}
h2 {text-align:center;font-size:36px;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:30px;max-width:1200px;margin:0 auto;}
.card {background:#111;border-radius:12px;padding:20px;text-align:center;}
img {width:100%;border-radius:12px;margin-bottom:10px;}
button {padding:10px 18px;border:none;border-radius:6px;margin:5px;}
.gold {background:#d4af37;color:#000;}
.white {background:#fff;color:#000;}
</style>
</head>
<body>

<section>
<h2>Sleepwalker Merch Collection</h2>

<div class="grid">

<div class="card">
<img src="PUT_HOODIE_IMAGE_LINK_HERE">
<h3>Sleepwalker Hoodie</h3>
<p>Not everyone asleep is resting.</p>
<button class="gold">Shopify (Coming Soon)</button>
<button class="white">Amazon (Coming Soon)</button>
</div>

<div class="card">
<img src="PUT_TOTE_IMAGE_LINK_HERE">
<h3>Sleepwalker Tote</h3>
<p>You were never lost.</p>
<button class="gold">Shopify (Coming Soon)</button>
<button class="white">Amazon (Coming Soon)</button>
</div>

<div class="card">
<img src="PUT_JOURNAL_IMAGE_LINK_HERE">
<h3>Supreme Energy Journal</h3>
<p>Protecting. Correcting. Directing.</p>
<button class="gold">Shopify (Coming Soon)</button>
<button class="white">Amazon (Coming Soon)</button>
</div>

</div>
</section>

</body>
</html>
